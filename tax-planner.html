<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Tax Planner | Professional Tool</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calculator-box {
            background: rgba(22, 27, 34, 0.9);
            padding: 40px 30px;
            border-radius: 12px;
            border: 2px solid rgba(56, 139, 253, 0.3);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h2 {
            color: #58a6ff;
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95em;
            color: #8b949e;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            border-radius: 6px;
            font-size: 1em;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .calc-btn {
            background-color: #21262d;
            border: 2px solid #58a6ff;
            color: #58a6ff;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .calc-btn:hover {
            background-color: #58a6ff;
            color: white;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #0d1117;
            border-radius: 6px;
            border: 1px dashed #58a6ff;
            display: none;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.05em;
        }
        .result-item:last-child {
            margin-bottom: 0;
            padding-top: 10px;
            border-top: 1px solid #30363d;
            font-weight: bold;
            font-size: 1.2em;
            color: #ff4d4d;
        }
        .taxable-amount { color: #58a6ff; }
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #8b949e;
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.3s;
        }
        .back-btn:hover { color: #58a6ff; }
    </style>
</head>
<body>

    <div class="calculator-box">
        <h2>Income Tax Planner</h2>
        
        <div class="input-group">
            <label>Gross Annual Income (₹)</label>
            <input type="number" id="grossIncome" placeholder="E.g., 1200000" required>
        </div>

        <div class="input-group">
            <label>Total Deductions (₹) (e.g., 80C, HRA)</label>
            <input type="number" id="deductions" placeholder="E.g., 150000" value="0">
        </div>

        <button class="calc-btn" onclick="calculateTax()">Estimate Tax</button>

        <div class="result-box" id="resultOutput">
            <div class="result-item">
                <span>Gross Income:</span>
                <span id="displayGross">₹0</span>
            </div>
            <div class="result-item">
                <span>Total Deductions:</span>
                <span id="displayDeductions">₹0</span>
            </div>
            <div class="result-item taxable-amount">
                <span>Net Taxable Income:</span>
                <span id="displayTaxable">₹0</span>
            </div>
            <div class="result-item">
                <span>Estimated Tax (Approx):</span>
                <span id="displayTax">₹0</span>
            </div>
        </div>

        <a href="index.html" class="back-btn">← Back to Main Portal</a>
    </div>

    <script>
        function calculateTax() {
            let gross = parseFloat(document.getElementById('grossIncome').value);
            let deductions = parseFloat(document.getElementById('deductions').value);
            
            if (isNaN(gross) || gross <= 0) {
                alert("Please enter a valid Gross Income.");
                return;
            }
            if (isNaN(deductions)) deductions = 0;

            let taxableIncome = gross - deductions;
            if (taxableIncome < 0) taxableIncome = 0;

            // Basic Old Regime Slab Logic (Simplified for demonstration)
            let tax = 0;
            if (taxableIncome > 1000000) {
                tax = 112500 + ((taxableIncome - 1000000) * 0.30);
            } else if (taxableIncome > 500000) {
                tax = 12500 + ((taxableIncome - 500000) * 0.20);
            } else if (taxableIncome > 250000) {
                tax = (taxableIncome - 250000) * 0.05;
            }

            // Section 87A Rebate (Simplified: No tax if taxable income <= 5L)
            if (taxableIncome <= 500000) {
                tax = 0;
            }

            // Add 4% Health & Education Cess
            let totalTax = tax + (tax * 0.04);

            document.getElementById('displayGross').innerText = "₹" + gross.toLocaleString('en-IN');
            document.getElementById('displayDeductions').innerText = "₹" + deductions.toLocaleString('en-IN');
            document.getElementById('displayTaxable').innerText = "₹" + taxableIncome.toLocaleString('en-IN');
            document.getElementById('displayTax').innerText = "₹" + Math.round(totalTax).toLocaleString('en-IN');
            
            document.getElementById('resultOutput').style.display = "block";
        }
    </script>
</body>
</html>
