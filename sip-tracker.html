<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Tracker | SIP Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calculator-box {
            background: rgba(22, 27, 34, 0.9);
            padding: 40px 30px;
            border-radius: 12px;
            border: 2px solid rgba(56, 139, 253, 0.3);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h2 {
            color: #58a6ff;
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95em;
            color: #8b949e;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            border-radius: 6px;
            font-size: 1em;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .calc-btn {
            background-color: #21262d;
            border: 2px solid #58a6ff;
            color: #58a6ff;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .calc-btn:hover {
            background-color: #58a6ff;
            color: white;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #0d1117;
            border-radius: 6px;
            border: 1px dashed #58a6ff;
            display: none;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.05em;
        }
        .result-item:last-child {
            margin-bottom: 0;
            padding-top: 10px;
            border-top: 1px solid #30363d;
            font-weight: bold;
            font-size: 1.3em;
            color: #52c41a; /* Green color for profit */
        }
        .invested-amount { color: #58a6ff; }
        .wealth-gain { color: #ffb86c; }
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #8b949e;
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.3s;
        }
        .back-btn:hover { color: #58a6ff; }
    </style>
</head>
<body>

    <div class="calculator-box">
        <h2>SIP Investment Tracker</h2>
        
        <div class="input-group">
            <label>Monthly Investment (₹)</label>
            <input type="number" id="monthlyInv" placeholder="E.g., 5000" required>
        </div>

        <div class="input-group">
            <label>Expected Return Rate (p.a %)</label>
            <input type="number" id="returnRate" placeholder="E.g., 12" value="12">
        </div>

        <div class="input-group">
            <label>Time Period (Years)</label>
            <input type="number" id="timeYears" placeholder="E.g., 10" required>
        </div>

        <button class="calc-btn" onclick="calculateSIP()">Calculate Wealth</button>

        <div class="result-box" id="resultOutput">
            <div class="result-item">
                <span>Total Invested:</span>
                <span id="displayInvested" class="invested-amount">₹0</span>
            </div>
            <div class="result-item">
                <span>Est. Wealth Gain:</span>
                <span id="displayGain" class="wealth-gain">₹0</span>
            </div>
            <div class="result-item">
                <span>Total Value:</span>
                <span id="displayTotal">₹0</span>
            </div>
        </div>

        <a href="index.html" class="back-btn">← Back to Main Portal</a>
    </div>

    <script>
        function calculateSIP() {
            let P = parseFloat(document.getElementById('monthlyInv').value);
            let rate = parseFloat(document.getElementById('returnRate').value);
            let years = parseFloat(document.getElementById('timeYears').value);
            
            if (isNaN(P) || isNaN(rate) || isNaN(years) || P <= 0 || years <= 0) {
                alert("Please enter valid positive numbers.");
                return;
            }

            // Formulas for compounding
            let i = rate / 12 / 100; // Monthly interest rate
            let n = years * 12; // Total number of months

            // Future Value of SIP Formula: M = P × ({[1 + i]^n - 1} / i) × (1 + i)
            let M = P * ((Math.pow(1 + i, n) - 1) / i) * (1 + i);
            
            let investedAmount = P * n;
            let wealthGain = M - investedAmount;

            document.getElementById('displayInvested').innerText = "₹" + Math.round(investedAmount).toLocaleString('en-IN');
            document.getElementById('displayGain').innerText = "₹" + Math.round(wealthGain).toLocaleString('en-IN');
            document.getElementById('displayTotal').innerText = "₹" + Math.round(M).toLocaleString('en-IN');
            
            document.getElementById('resultOutput').style.display = "block";
        }
    </script>
</body>
</html>
